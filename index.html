<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torn Bounty Board</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Torn Bounty Board</h1>
    <div id="api-key-section">
      <input
        type="password"
        id="api-key-input"
        placeholder="Enter your Torn API key"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="save-key-btn">Save Key</button>
      <button id="clear-key-btn" class="secondary">Clear Key</button>
    </div>
    <p id="key-privacy-note">
      🔒 Your API key is saved in <strong>your browser only</strong> — it is never uploaded to or stored by this site. Calls go directly from your browser to <code>api.torn.com</code>.
    </p>
    <div id="status-bar">
      <span id="status-msg"></span>
      <span id="countdown-display"></span>
      <select id="auto-refresh-select" title="Auto-refresh interval">
        <option value="0">Auto: Off</option>
        <option value="120">Auto: 2m</option>
        <option value="300">Auto: 5m</option>
        <option value="600">Auto: 10m</option>
      </select>
      <button id="refresh-btn" disabled>Refresh</button>
    </div>
  </header>

  <main>
    <button id="filter-toggle" class="secondary">Filters ▾</button>
    <div id="filters">
      <label class="filter-wide">
        Name search
        <input type="search" id="filter-name" placeholder="Search player name…" autocomplete="off" />
      </label>
      <label>
        Anonymous
        <select id="filter-anonymous">
          <option value="all">All</option>
          <option value="anonymous">Anonymous only</option>
          <option value="named">Named only</option>
        </select>
      </label>
      <label>
        Has reason
        <select id="filter-has-reason">
          <option value="all">All</option>
          <option value="yes">With reason</option>
          <option value="no">No reason</option>
        </select>
      </label>
      <label>
        Min level
        <input type="number" id="filter-level-min" min="1" max="100" placeholder="1" />
      </label>
      <label>
        Max level
        <input type="number" id="filter-level-max" min="1" max="100" placeholder="100" />
      </label>
      <label>
        Min quantity
        <input type="number" id="filter-qty-min" min="1" placeholder="1" />
      </label>
      <label>
        Min reward ($)
        <input type="number" id="filter-bounty-min" min="0" placeholder="0" />
      </label>
      <label>
        Min total value ($)
        <input type="number" id="filter-total-min" min="0" placeholder="0" />
      </label>
      <label>
        Sort by
        <select id="sort-select">
          <option value="reward-desc">Reward ↓</option>
          <option value="reward-asc">Reward ↑</option>
          <option value="total-desc">Total value ↓</option>
          <option value="total-asc">Total value ↑</option>
          <option value="level-asc">Level ↑</option>
          <option value="level-desc">Level ↓</option>
          <option value="qty-desc">Quantity ↓</option>
          <option value="qty-asc">Quantity ↑</option>
        </select>
      </label>
      <label>
        My level
        <input type="number" id="my-level" min="1" max="100" placeholder="—"
               title="Highlights bounties within ±10 levels (approx. fair fight range)" />
      </label>
      <button id="reset-filters-btn" class="secondary">Reset</button>
    </div>

    <div id="bounty-count"></div>

    <div id="bounty-list" aria-live="polite">
      <p class="placeholder">Enter your API key above to load bounties.</p>
    </div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
